<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body id="page">
  <h2>Arrow Function Example</h2>
  <button id="colorBtn">Change Background</button>

  <script>
    const changeBackground = () => {
      document.querySelector("#page").style.backgroundColor = "lightblue";
    };

    document
      .querySelector("#colorBtn")
      .addEventListener("click", changeBackground);
  </script>
</body>
</html>
