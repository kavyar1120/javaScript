<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="profile"></h2>
    <button onclick="showprofile()">show profile</button>

    <script>
        let user={
            name:"sneha",
            role:"Admin",
            department:"Engineering"
        };
        function showprofile() {
            let {name,role}=user;
            document.querySelector("#profile").innerText=name+"("+role+")";
        }
    </script>
</body>
</html>
