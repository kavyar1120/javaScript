<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="message">Welcome</h2>
    <button onclick="updateMessage('Good Morning')">Morning</button>
    <button onclick="updateMessage('Good Evening')">Evening</button>

    <script>
        function updateMessage(text){
            let heading=document.querySelector("#message");
            heading.innerText=text;
        }
    </script>

</body>
</html>
