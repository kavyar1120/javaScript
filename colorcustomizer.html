<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="text">Change My color</h1>
    <button onclick="applyColor('red')">Red</button>
    <button onclick="applyColor('green')">Green</button>
    <button onclick="applyColor('blue')">blue</button>

    <script>
        const applyColor=(newColor)=>{
            const heading=document.querySelector("#text");
            heading.style.color=newColor;
        };
    </script>



</body>
</html>
