<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <button id="style-btn">Apply Style</button> 
   <div id="box" style="width:200px; height:100px; border:1px solid black;">
    Target Box
</div>
<script>
    const design={
        color:"white",
        bg:"purple",
        padding:"20px"
    };

    document.querySelector("#style-btn").addEventListener("click",()=>{
        const box=document.querySelector("#box");

        box.style.color=design.color;
        box.style.backgroundColor=design.bg;
        box.style.padding=design.padding;
    });
</script>
</body>
</html>
