<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2 id="status"></h2>
    <script>
        let user={
            isLoggedIn:true,
            username:"Kavya"
        };
        if (user.isLoggedIn) {
            document.querySelector("#status").innerText="welcome"+user.username;
        } else {
            document.querySelector("#status").innerText="Please Login";
        }
    </script>
</body>
</html>
