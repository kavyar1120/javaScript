<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button id="calc-btn">Add Numbers</button>
    <h3>Result:<span id="result">0</span></h3>

    <script>
        const sum=(a,b)=>{
            return a+b;
        };

        const btn=document.querySelector("#calc-btn");

        btn.addEventListener("click", ()=>{
            const val1=Number(document.querySelector("#num1").value);
            const val2=Number(document.querySelector("#num2").value);

            const total=sum(val1,val2);
            document.querySelector("#result").innerText=total;
         });
    </script>
    

</body>
</html>
