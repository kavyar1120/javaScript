<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Current price: ₹<span id="price-ui">500</span></p>
    <button id="discount-btn">Apply 10% discount</button>

    <script>
        let product={title:"watch", price:500};

        document.querySelector("#discount-btn").addEventListener("click",()=>{

            product.price=product.price-(product.price*0.1);

            document.querySelector("#price-ui").innerText=product.price;
        });
    </script>
</body>
</html>
